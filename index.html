<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f3ef;color:#1a1a18;min-height:100vh}
.header{background:#1a3a2a;color:#fff;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}

.header p{font-size:11px;opacity:0.65;margin-top:2px}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.header button{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.35);background:transparent;color:#fff;cursor:pointer}
.header button:hover{background:rgba(255,255,255,0.1)}
.sync-status{font-size:11px;padding:4px 10px;border-radius:8px;display:flex;align-items:center;gap:5px}
.sync-status.ok{background:rgba(255,255,255,0.1);color:#a8f0c0}
.sync-status.saving{background:rgba(255,255,255,0.1);color:#ffd97a}
.sync-status.error{background:rgba(220,50,50,0.3);color:#ffaaaa}
.sync-dot{width:7px;height:7px;border-radius:50%;background:currentColor}

.month-bar{background:#fff;border-bottom:1px solid #e0ded8;padding:0 32px;display:flex;gap:0;overflow-x:auto}
.month-tab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;color:#888;white-space:nowrap;transition:all 0.15s}
.month-tab:hover{color:#1a3a2a}
.month-tab.active{color:#1a3a2a;border-bottom-color:#1a3a2a}
.month-tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-left:5px;background:#ccc;vertical-align:middle}
.month-tab .dot.has-data{background:#1a7a40}
.month-tab .dot.full{background:#1a7a40}

.main{max-width:920px;margin:0 auto;padding:24px 20px}

.loading-overlay{position:fixed;inset:0;background:rgba(244,243,239,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #e0ded8;border-top-color:#1a3a2a;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay p{font-size:13px;color:#666}

.stat-num.amber{color:#c97b00}
.stat-num.red{color:#c0392b}
.progress-bar{height:6px;background:#e8e6e0;border-radius:3px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:#1a7a40;transition:width 0.5s ease}

.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #ccc;background:#fff;color:#555;cursor:pointer;transition:all 0.15s}
.filter-btn.active{background:#1a3a2a;color:#fff;border-color:#1a3a2a}
.reset-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #e0a0a0;background:#fff;color:#c0392b;cursor:pointer}
.reset-btn:hover{background:#fde8e8}

.section-block{background:#fff;border:1px solid #e0ded8;border-radius:12px;margin-bottom:10px;overflow:hidden}
.section-header{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;background:#f9f8f5;user-select:none}
.section-header:hover{background:#f0efe8}
.chevron{font-size:11px;color:#888;transition:transform 0.2s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.section-title{font-size:13px;font-weight:600;flex:1;color:#1a1a18}
.section-progress{font-size:11px;color:#888;white-space:nowrap}
.section-badge{font-size:11px;padding:2px 9px;border-radius:10px;font-weight:500;white-space:nowrap}
.badge-ok{background:#d4f0df;color:#1a7a40}
.badge-pend{background:#fff3cd;color:#c97b00}
.badge-no{background:#fde8e8;color:#c0392b}

.items-list{display:none;padding:0 0 6px}
.items-list.open{display:block}
.item-row{display:grid;grid-template-columns:32px 1fr auto;align-items:start;gap:10px;padding:8px 16px;border-top:1px solid #f0efe8}
.checkbox{width:20px;height:20px;border:1.5px solid #bbb;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.15s}
.checkbox:hover{border-color:#1a7a40}
.checkbox.checked{background:#1a7a40;border-color:#1a7a40}
.checkbox.checked::after{content:'';display:block;width:6px;height:10px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
.checkbox.loading{opacity:0.4;pointer-events:none}
.item-text{font-size:13px;color:#1a1a18;line-height:1.45}
.item-resp{font-size:11px;color:#888;margin-top:2px}

// ── State ─────────────────────────────────────────────────────────────
let dbState = {}; // { "mes-secId-itemIdx": 0|1 }
let currentMonth = new Date().getMonth();
let filterMode = 'all';
let openSections = {};
let syncTimer = null;

function stateKey(mes, secId, idx) { return `${mes}-${secId}-${idx}`; }
function getStatus(mes, secId, idx) { return dbState[stateKey(mes,secId,idx)] || 0; }
function setStatus(mes, secId, idx, val) { dbState[stateKey(mes,secId,idx)] = val; }

function countDoneForMonth(mes) {
  return SECTIONS.reduce((a,s) => a + s.items.filter((_,i) => getStatus(mes,s.id,i)===1).length, 0);
}

// ── Supabase API ──────────────────────────────────────────────────────
function setSyncStatus(state, text) {
  const el = document.getElementById('syncStatus');
  const tx = document.getElementById('syncText');
  el.className = 'sync-status ' + state;
  tx.textContent = text;
}

async function loadAllFromDB() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/checklist?select=mes,sec_id,item_idx,status`, {headers: HEADERS});
    if (!res.ok) throw new Error('Erro a carregar');
    const rows = await res.json();
    dbState = {};
    rows.forEach(r => { dbState[stateKey(r.mes, r.sec_id, r.item_idx)] = r.status; });
    setSyncStatus('ok','Ligado');
  } catch(e) {
    setSyncStatus('error','Sem ligação');
  }
}

async function upsertItem(mes, secId, itemIdx, status) {
  setSyncStatus('saving','A guardar...');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/checklist`, {
      method: 'POST',
      headers: {...HEADERS, 'Prefer': 'resolution=merge-duplicates'},
      body: JSON.stringify({mes, sec_id: secId, item_idx: itemIdx, status, updated_at: new Date().toISOString()})
    });
    if (!res.ok) throw new Error('Erro ao guardar');
    setSyncStatus('ok','Guardado ✓');
    setTimeout(()=>setSyncStatus('ok','Ligado'), 2000);
  } catch(e) {
    setSyncStatus('error','Erro ao guardar');
  }
}

async function deleteMonth(mes) {
  setSyncStatus('saving','A limpar...');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/checklist?mes=eq.${mes}`, {
      method: 'DELETE', headers: HEADERS
    });
    if (!res.ok) throw new Error();
    setSyncStatus('ok','Mês limpo ✓');
    setTimeout(()=>setSyncStatus('ok','Ligado'), 2000);
  } catch(e) {
    setSyncStatus('error','Erro ao limpar');
  }
}

// ── Month bar ─────────────────────────────────────────────────────────
function renderMonthBar() {
  document.getElementById('monthBar').innerHTML = MONTHS.map((m,i) => {
    const done = countDoneForMonth(i);
    const full = done === TOTAL_ITEMS;
    const hasData = done > 0;
    return `<div class="month-tab ${i===currentMonth?'active':''}" onclick="switchMonth(${i})">
      ${m}<span class="dot ${full?'full':hasData?'has-data':''}"></span></div>`;
  }).join('');
}

function switchMonth(idx) {
  currentMonth = idx;
  openSections = {};
  renderMonthBar();
  renderStats();
  renderSections();
}

// ── Stats ─────────────────────────────────────────────────────────────
function renderStats() {
  const done = countDoneForMonth(currentMonth);
  const pct = Math.round(done/TOTAL_ITEMS*100);
  const pending = TOTAL_ITEMS - done;
  const secDone = SECTIONS.filter(s => s.items.every((_,i)=>getStatus(currentMonth,s.id,i)===1)).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-label">Progresso — ${MONTHS[currentMonth]}</div>
      <div class="stat-num ${pct>=75?'green':pct>=40?'amber':'red'}">${pct}%</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    <div class="stat"><div class="stat-label">Tarefas Concluídas</div><div class="stat-num green">${done}</div></div>
    <div class="stat"><div class="stat-label">Por Concluir</div><div class="stat-num ${pending>10?'red':'amber'}">${pending}</div></div>
    <div class="stat"><div class="stat-label">Secções Completas</div><div class="stat-num">${secDone} / ${SECTIONS.length}</div></div>`;
}

// ── Filter ────────────────────────────────────────────────────────────
function setFilter(mode, btn) {
  filterMode = mode;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSections();
}

// ── Toggle ────────────────────────────────────────────────────────────
async function toggleItem(secId, itemIdx) {
  const cur = getStatus(currentMonth, secId, itemIdx);
  const newVal = cur===1 ? 0 : 1;
  setStatus(currentMonth, secId, itemIdx, newVal);

  // Update checkbox immediately (optimistic UI)
  const cb = document.querySelector(`[data-cb="${secId}-${itemIdx}"]`);
  if (cb) { cb.className = 'checkbox loading ' + (newVal===1?'checked':''); }

  await upsertItem(currentMonth, secId, itemIdx, newVal);

  if (cb) cb.className = 'checkbox ' + (newVal===1?'checked':'');
  renderStats();
  renderMonthBar();
  updateSectionBadge(secId);
  if (filterMode !== 'all') renderSections();
}

function toggleSection(id) {
  openSections[id] = !openSections[id];
  document.querySelector(`[data-sec="${id}"] .items-list`).classList.toggle('open', !!openSections[id]);
  document.querySelector(`[data-sec="${id}"] .chevron`).classList.toggle('open', !!openSections[id]);
}

function updateSectionBadge(secId) {
  const sec = SECTIONS.find(s=>s.id===secId);
  const done = sec.items.filter((_,i)=>getStatus(currentMonth,secId,i)===1).length;
  const total = sec.items.length;
  const pct = Math.round(done/total*100);
  const el = document.querySelector(`[data-sec="${secId}"] .section-badge`);
  const pr = document.querySelector(`[data-sec="${secId}"] .section-progress`);
  if (el){ el.className='section-badge '+(pct===100?'badge-ok':pct>0?'badge-pend':'badge-no'); el.textContent=pct===100?'Completo':pct>0?pct+'%':'Pendente'; }
  if (pr) pr.textContent=`${done}/${total}`;
}

async function resetMonth() {
  if (!confirm(`Limpar todo o progresso de ${MONTHS[currentMonth]}?`)) return;
  SECTIONS.forEach(s => s.items.forEach((_,i) => setStatus(currentMonth,s.id,i,0)));
  await deleteMonth(currentMonth);
  renderMonthBar(); renderStats(); renderSections();
}

// ── Sections ──────────────────────────────────────────────────────────
function renderSections() {
  let html = '';
  SECTIONS.forEach(sec => {
    const done = sec.items.filter((_,i)=>getStatus(currentMonth,sec.id,i)===1).length;
    const total = sec.items.length;
    const pct = Math.round(done/total*100);
    const isOpen = !!openSections[sec.id];
    const allItems = sec.items.map((item,i)=>({item,i}));
    const visItems = filterMode==='done' ? allItems.filter(({i})=>getStatus(currentMonth,sec.id,i)===1)
      : filterMode==='pending' ? allItems.filter(({i})=>getStatus(currentMonth,sec.id,i)===0)
      : allItems;
    if (filterMode!=='all' && visItems.length===0) return;
    const bc = pct===100?'badge-ok':pct>0?'badge-pend':'badge-no';
    const bl = pct===100?'Completo':pct>0?`${pct}%`:'Pendente';
    let ihtml = '';
    visItems.forEach(({item,i}) => {
      const checked = getStatus(currentMonth,sec.id,i)===1;
      ihtml += `<div class="item-row">
        <div class="checkbox ${checked?'checked':''}" data-cb="${sec.id}-${i}" onclick="toggleItem('${sec.id}',${i})"></div>
        <div><div class="item-text">${item.text}</div><div class="item-resp">${item.resp}</div></div>
        <div class="item-meta">${item.deadline!=='—'?`<span class="item-deadline">${item.deadline}</span>`:''}</div>
      </div>`;
    });
    html += `<div class="section-block" data-sec="${sec.id}">
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <span class="chevron ${isOpen?'open':''}">&#9654;</span>
        <span class="section-title">${sec.label}</span>
        <span class="section-progress">${done}/${total}</span>
        <span class="section-badge ${bc}">${bl}</span>
      </div>
      <div class="items-list ${isOpen?'open':''}">${ihtml}</div>
    </div>`;
  });
  if (!html) html = '<div class="empty-msg">Nenhuma tarefa nesta categoria para mostrar.</div>';
  document.getElementById('sectionsArea').innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────────────
(async () => {
  await loadAllFromDB();
  document.getElementById('loadingOverlay').style.display = 'none';
  renderMonthBar();
  renderStats();
  renderSections();
})();
</script>
</body>
</html>
